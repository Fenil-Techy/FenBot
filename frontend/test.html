<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-50">
    <nav class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-4">
            
            <div class="flex justify-between items-center py-4">
                <h1 class="text-2xl font-bold">MySite</h1>
                
                <!-- Mobile Menu Button -->
                <button id="menu-btn" class="md:hidden text-3xl focus:outline-none">
                    ☰
                </button>
                
                <!-- Off-canvas Mobile Menu -->
                <div id="mobile-menu"
                class="fixed top-0 right-0 w-64 h-full bg-white shadow-lg transform translate-x-full transition-transform duration-300 md:hidden z-50">
                <div class="p-6 flex flex-col gap-6 text-lg">
                    <button id="close-btn" class="self-end text-2xl">✕</button>
                    <a href="#">Home</a>
                    <a href="#">Services</a>
                    <a href="#">Contact</a>
                </div>
            </div>
            
            
            <!-- Desktop Menu -->
            <ul class="hidden md:flex gap-8 text-lg font-medium">
                <li><a href="#">Home</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
            </div>
            
            <!-- Mobile Menu -->
            <div id="mobile-menu" class="hidden md:hidden flex flex-col gap-4 pb-4">
                <a href="#" class="block">Home</a>
                <a href="#" class="block">Services</a>
                <a href="#" class="block">Contact</a>
            </div>
            
        </div>
    </nav>
    
    
    <section class="max-w-7xl mx-auto px-4 py-16">
        <div class="flex flex-col md:flex-row lg:p-10  items-center  gap-10">
            
            <!-- Text -->
            <div class=" md:w-1/2">
                <h2 class="text-3xl md:text-5xl font-bold mb-4">
                    Build Responsive Websites
                </h2>
                <p class="text-gray-600 mb-6">
                    Learn how to create fully responsive layouts using Tailwind CSS.
                </p>
                <button class="bg-blue-600 text-white px-6 py-3 rounded-lg">
                    Get Started
                </button>
            </div>
            
            <!-- Image -->
            <div class="-order-1 md:w-1/2 md:order-0">
                <img src="https://www.webfx.com/wp-content/uploads/2021/10/iStock-612224522.jpg"
                class="w-full rounded-lg" />
            </div>
            
        </div>
    </section>
    
    
    <section class="bg-white py-16 ">
        <div class="max-w-7xl mx-auto px-4">
            <h3 class="text-2xl md:text-3xl font-bold text-center mb-12">
                Features
            </h3>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                
                <div class="p-6 shadow rounded-lg text-center">
                    <h4 class="font-bold text-xl mb-2">Fast</h4>
                    <p class="text-gray-600">Optimized for speed</p>
                </div>
                
                <div class="p-6 shadow rounded-lg text-center">
                    <h4 class="font-bold text-xl mb-2">Responsive</h4>
                    <p class="text-gray-600">Works on all devices</p>
                </div>
                
                <div class="p-6 shadow rounded-lg text-center">
                    <h4 class="font-bold text-xl mb-2">Easy</h4>
                    <p class="text-gray-600">Simple utilities</p>
                </div>
                
                <div class="hidden lg:block p-6 shadow rounded-lg text-center">
                    <h4 class="font-bold text-xl mb-2">Flexible</h4>
                    <p class="text-gray-600">easy flow</p>
                </div>
                
            </div>
        </div>
    </section>
    
    
    <script>
        const menuBtn = document.getElementById("menu-btn");
        const closeBtn = document.getElementById("close-btn");
        const mobileMenu = document.getElementById("mobile-menu");
        
        menuBtn.addEventListener("click", () => {
            mobileMenu.classList.remove("translate-x-full");
        });
        
        closeBtn.addEventListener("click", () => {
            mobileMenu.classList.add("translate-x-full");
        });
    </script>
    
    
    <script src="http://localhost:3000/embed.js" data-bot-id="df03b410-e5be-4246-9a40-ce56588bacd3"></script>
</body>

</html>
